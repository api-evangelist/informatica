naftiko: "1.0.0-alpha1"

info:
  label: "Informatica Platform REST API"
  description: "Informatica IICS Platform REST API providing access to authentication, connections, mappings, mapping tasks, jobs, schedules, and activity logs."
  tags:
    - Informatica
    - Data Integration
    - ETL
    - Platform
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      INFORMATICA_USERNAME: INFORMATICA_USERNAME
      INFORMATICA_PASSWORD: INFORMATICA_PASSWORD

capability:
  consumes:
    - type: http
      namespace: informatica-platform
      baseUri: https://dm-us.informaticacloud.com
      description: "Informatica IICS Platform REST API for data integration management."
      authentication:
        type: apikey
        key: icSessionId
        value: "{{INFORMATICA_SESSION_ID}}"
        placement: header
      resources:
        - name: authentication
          path: /ma/api/v2/user
          description: "Authentication and session management."
          operations:
            - name: login
              method: POST
              description: "Authenticate and obtain a session ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  "@type": "login"
                  username: "{{tools.username}}"
                  password: "{{tools.password}}"
            - name: logout
              method: POST
              description: "End the current REST API session."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: connections
          path: /saas/api/v2/connection
          description: "Manage data source connections."
          operations:
            - name: list-connections
              method: GET
              description: "Retrieve all connections in the organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-connection
              method: POST
              description: "Create a new connection."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  "@type": "connection"
                  name: "{{tools.name}}"
                  type: "{{tools.type}}"
        - name: connection-details
          path: /saas/api/v2/connection/{connectionId}
          description: "Manage individual connections."
          operations:
            - name: get-connection
              method: GET
              description: "Retrieve a connection by ID."
              inputParameters:
                - name: connectionId
                  in: path
                  type: string
                  required: true
                  description: "Connection ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-connection
              method: PUT
              description: "Update an existing connection."
              inputParameters:
                - name: connectionId
                  in: path
                  type: string
                  required: true
                  description: "Connection ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-connection
              method: DELETE
              description: "Delete a connection."
              inputParameters:
                - name: connectionId
                  in: path
                  type: string
                  required: true
                  description: "Connection ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: mappings
          path: /saas/api/v2/mapping
          description: "Manage data integration mappings."
          operations:
            - name: list-mappings
              method: GET
              description: "Retrieve all mappings in the organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: mapping-details
          path: /saas/api/v2/mapping/{mappingId}
          description: "Manage individual mappings."
          operations:
            - name: get-mapping
              method: GET
              description: "Retrieve a mapping by ID."
              inputParameters:
                - name: mappingId
                  in: path
                  type: string
                  required: true
                  description: "Mapping ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: mapping-tasks
          path: /saas/api/v2/mttask
          description: "Manage mapping tasks."
          operations:
            - name: list-mapping-tasks
              method: GET
              description: "Retrieve all mapping tasks."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-mapping-task
              method: POST
              description: "Create a new mapping task."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  "@type": "mtTask"
                  name: "{{tools.name}}"
        - name: mapping-task-details
          path: /saas/api/v2/mttask/{taskId}
          description: "Manage individual mapping tasks."
          operations:
            - name: get-mapping-task
              method: GET
              description: "Retrieve a mapping task by ID."
              inputParameters:
                - name: taskId
                  in: path
                  type: string
                  required: true
                  description: "Task ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-mapping-task
              method: PUT
              description: "Update a mapping task."
              inputParameters:
                - name: taskId
                  in: path
                  type: string
                  required: true
                  description: "Task ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-mapping-task
              method: DELETE
              description: "Delete a mapping task."
              inputParameters:
                - name: taskId
                  in: path
                  type: string
                  required: true
                  description: "Task ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: jobs
          path: /saas/api/v2/job
          description: "Manage job execution."
          operations:
            - name: start-job
              method: POST
              description: "Start a job for a task or taskflow."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  "@type": "job"
                  taskId: "{{tools.taskId}}"
                  taskType: "{{tools.taskType}}"
            - name: stop-job
              method: POST
              description: "Stop a running job."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  "@type": "job"
                  taskId: "{{tools.taskId}}"
        - name: activity-log
          path: /saas/api/v2/activity/activityLog
          description: "View activity logs."
          operations:
            - name: get-activity-log
              method: GET
              description: "Retrieve the activity log."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: schedules
          path: /saas/api/v2/schedule
          description: "Manage task schedules."
          operations:
            - name: list-schedules
              method: GET
              description: "List all schedules."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-schedule
              method: POST
              description: "Create a new schedule."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  "@type": "schedule"
                  name: "{{tools.name}}"
        - name: schedule-details
          path: /saas/api/v2/schedule/{scheduleId}
          description: "Manage individual schedules."
          operations:
            - name: get-schedule
              method: GET
              description: "Retrieve a schedule by ID."
              inputParameters:
                - name: scheduleId
                  in: path
                  type: string
                  required: true
                  description: "Schedule ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-schedule
              method: PUT
              description: "Update a schedule."
              inputParameters:
                - name: scheduleId
                  in: path
                  type: string
                  required: true
                  description: "Schedule ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-schedule
              method: DELETE
              description: "Delete a schedule."
              inputParameters:
                - name: scheduleId
                  in: path
                  type: string
                  required: true
                  description: "Schedule ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: informatica-platform-rest
      resources:
        - path: /v1/connections
          name: connections
          description: "Connection management."
          operations:
            - method: GET
              name: list-connections
              description: "List all connections."
              call: "informatica-platform.list-connections"

    - type: mcp
      port: 9100
      namespace: informatica-platform-mcp
      transport: http
      tools:
        - name: list-connections
          description: "List all connections in the organization."
          hints:
            readOnly: true
          call: "informatica-platform.list-connections"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-connection
          description: "Get a connection by ID."
          hints:
            readOnly: true
            idempotent: true
          call: "informatica-platform.get-connection"
          with:
            connectionId: "tools.connectionId"
          outputParameters:
            - type: object
              mapping: "$."
