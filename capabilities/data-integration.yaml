naftiko: "1.0.0-alpha1"

info:
  label: "Informatica Data Integration"
  description: "Unified workflow for managing data integration pipelines including connections, mappings, mapping tasks, job execution, scheduling, and activity monitoring. Used by data engineers and ETL developers."
  tags:
    - Informatica
    - Data Integration
    - ETL
    - Pipeline Management
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      INFORMATICA_USERNAME: INFORMATICA_USERNAME
      INFORMATICA_PASSWORD: INFORMATICA_PASSWORD

capability:
  consumes:
    - import: informatica-platform
      location: ./shared/platform-rest-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: informatica-integration-api
      description: "Unified REST API for Informatica data integration management."
      resources:
        - path: /v1/connections
          name: connections
          description: "Data source connection management."
          operations:
            - method: GET
              name: list-connections
              description: "List all connections."
              call: "informatica-platform.list-connections"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-connection
              description: "Create a new connection."
              call: "informatica-platform.create-connection"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/connections/{id}
          name: connection-details
          description: "Individual connection management."
          operations:
            - method: GET
              name: get-connection
              description: "Get connection details."
              call: "informatica-platform.get-connection"
              with:
                connectionId: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-connection
              description: "Update a connection."
              call: "informatica-platform.update-connection"
              with:
                connectionId: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-connection
              description: "Delete a connection."
              call: "informatica-platform.delete-connection"
              with:
                connectionId: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/mappings
          name: mappings
          description: "Data mapping management."
          operations:
            - method: GET
              name: list-mappings
              description: "List all mappings."
              call: "informatica-platform.list-mappings"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/mapping-tasks
          name: mapping-tasks
          description: "Mapping task management."
          operations:
            - method: GET
              name: list-mapping-tasks
              description: "List all mapping tasks."
              call: "informatica-platform.list-mapping-tasks"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-mapping-task
              description: "Create a new mapping task."
              call: "informatica-platform.create-mapping-task"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/jobs
          name: jobs
          description: "Job execution management."
          operations:
            - method: POST
              name: start-job
              description: "Start a job."
              call: "informatica-platform.start-job"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: informatica-integration-mcp
      transport: http
      description: "MCP server for AI-assisted Informatica data integration management."
      tools:
        - name: login
          description: "Authenticate and obtain a session ID."
          hints:
            readOnly: false
          call: "informatica-platform.login"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-connections
          description: "List all data source connections."
          hints:
            readOnly: true
          call: "informatica-platform.list-connections"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-connection
          description: "Get connection details by ID."
          hints:
            readOnly: true
            idempotent: true
          call: "informatica-platform.get-connection"
          with:
            connectionId: "tools.connectionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-connection
          description: "Create a new data source connection."
          hints:
            readOnly: false
          call: "informatica-platform.create-connection"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-connection
          description: "Update an existing connection."
          hints:
            readOnly: false
            idempotent: true
          call: "informatica-platform.update-connection"
          with:
            connectionId: "tools.connectionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-connection
          description: "Delete a connection."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "informatica-platform.delete-connection"
          with:
            connectionId: "tools.connectionId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-mappings
          description: "List all data mappings."
          hints:
            readOnly: true
          call: "informatica-platform.list-mappings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-mapping
          description: "Get mapping details by ID."
          hints:
            readOnly: true
            idempotent: true
          call: "informatica-platform.get-mapping"
          with:
            mappingId: "tools.mappingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-mapping-tasks
          description: "List all mapping tasks."
          hints:
            readOnly: true
          call: "informatica-platform.list-mapping-tasks"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-mapping-task
          description: "Create a new mapping task."
          hints:
            readOnly: false
          call: "informatica-platform.create-mapping-task"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-mapping-task
          description: "Get mapping task details by ID."
          hints:
            readOnly: true
            idempotent: true
          call: "informatica-platform.get-mapping-task"
          with:
            taskId: "tools.taskId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-mapping-task
          description: "Update a mapping task."
          hints:
            readOnly: false
            idempotent: true
          call: "informatica-platform.update-mapping-task"
          with:
            taskId: "tools.taskId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-mapping-task
          description: "Delete a mapping task."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "informatica-platform.delete-mapping-task"
          with:
            taskId: "tools.taskId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: start-job
          description: "Start a job for a task or taskflow."
          hints:
            readOnly: false
          call: "informatica-platform.start-job"
          outputParameters:
            - type: object
              mapping: "$."
        - name: stop-job
          description: "Stop a running job."
          hints:
            readOnly: false
            destructive: true
          call: "informatica-platform.stop-job"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-activity-log
          description: "Retrieve the activity log."
          hints:
            readOnly: true
          call: "informatica-platform.get-activity-log"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-schedules
          description: "List all task schedules."
          hints:
            readOnly: true
          call: "informatica-platform.list-schedules"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-schedule
          description: "Create a new schedule."
          hints:
            readOnly: false
          call: "informatica-platform.create-schedule"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-schedule
          description: "Get schedule details by ID."
          hints:
            readOnly: true
            idempotent: true
          call: "informatica-platform.get-schedule"
          with:
            scheduleId: "tools.scheduleId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-schedule
          description: "Update a schedule."
          hints:
            readOnly: false
            idempotent: true
          call: "informatica-platform.update-schedule"
          with:
            scheduleId: "tools.scheduleId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-schedule
          description: "Delete a schedule."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "informatica-platform.delete-schedule"
          with:
            scheduleId: "tools.scheduleId"
          outputParameters:
            - type: object
              mapping: "$."
