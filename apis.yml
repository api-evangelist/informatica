description: >-
  Collection of APIs for Informatica Intelligent Cloud Services (IICS) and
  Intelligent Data Management Cloud (IDMC), providing programmatic access to
  data integration, data governance, data quality, master data management,
  B2B gateway, and platform administration capabilities.
