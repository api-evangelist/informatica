apis:
  - aid: informatica:informatica
    name: Informatica Platform REST API
    description: >-
      The Informatica Intelligent Cloud Services Platform REST API provides
      access to platform-level resources including login and authentication,
      roles and privileges, user and user group management, organizations,
      connections, schedules, runtime environments, Secure Agent services,
      object permissions, export and import, source control, projects and
      folders, licenses, metering data, and security logs. Supports version 2
      (JSON and XML) and version 3 (JSON) resource formats.
    humanURL: https://docs.informatica.com/integration-cloud/cloud-platform/current-version/rest-api-reference/informatica-intelligent-cloud-services-rest-api.html
    tags:
      - Authentication
      - Platform
      - Roles
      - Users
