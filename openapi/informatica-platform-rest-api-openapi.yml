      name: mappingId
      in: path
      required: true
      description: The unique identifier of the mapping.
      schema:
        type: string
    mappingName:
      name: mappingName
      in: path
      required: true
      description: The name of the mapping.
      schema:
        type: string
    taskId:
      name: taskId
      in: path
      required: true
      description: The unique identifier of the mapping task.
      schema:
        type: string
