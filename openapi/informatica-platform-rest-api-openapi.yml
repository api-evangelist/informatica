openapi: 3.1.0
info:
  title: Informatica IICS Platform REST API
  description: >-
    The Informatica Intelligent Cloud Services (IICS) Platform REST API
    provides programmatic access to platform-level resources including
    authentication, connections, mappings, mapping tasks, and job
    management. The API supports version 2 (JSON and XML) and version 3
    (JSON) resource formats. All authenticated requests require a valid
    session ID obtained from the login endpoint.
  version: 2.0.0
  contact:
    name: Informatica
    url: https://www.informatica.com/support.html
  license:
    name: Proprietary
    url: https://www.informatica.com/legal.html
  termsOfService: https://www.informatica.com/legal.html
  x-informatica-api-version: v2
externalDocs:
  description: Informatica IICS REST API Reference
  url: https://docs.informatica.com/integration-cloud/cloud-platform/current-version/rest-api-reference/informatica-intelligent-cloud-services-rest-api.html
servers:
- url: https://dm-us.informaticacloud.com
  description: North America production pod
- url: https://dm-em.informaticacloud.com
  description: Europe production pod
- url: https://dm-ap.informaticacloud.com
  description: Asia-Pacific production pod
security:
- icSessionId: []
tags:
- name: Authentication
  description: Login and session management operations.
- name: Connections
  description: >-
    Manage connections to data sources and targets including databases,
    flat files, cloud applications, and SaaS services.
- name: Jobs
  description: >-
    Start, stop, and monitor job execution for tasks, taskflows, and
    other runnable assets.
- name: Mapping Tasks
  description: >-
    Create, retrieve, update, and delete mapping task configurations
    that execute mappings with specific runtime parameters.
- name: Mappings
  description: >-
    Retrieve mapping definitions and metadata for data integration
    mappings within the organization.
- name: Schedules
  description: Manage task execution schedules.
paths:
  /ma/api/v2/user/login:
    post:
      operationId: login
      summary: Log in to Informatica Intelligent Cloud Services
      description: >-
        Authenticates a user and returns a session ID and server URL for
        subsequent API calls. The session ID expires after 30 minutes of
        inactivity.
      tags:
      - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              '@type': login
              username: user@example.com
              password: securePassword123
      responses:
        '200':
          description: Successful authentication.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                id: 0012ABC000000001
                orgId: 00DXYZ000000001
                orgUuid: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                name: user@example.com
                firstName: John
                lastName: Doe
                serverUrl: https://na4.dm-us.informaticacloud.com/saas
                icSessionId: abcdef1234567890abcdef1234567890
                securityQuestion: What is your pet name?
                securityAnswer: ''
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Login401Example:
                  summary: Default login 401 response
                  x-microcks-default: true
                  value:
                    '@type': example_value
                    statusCode: 10
                    message: example_value
                    description: A sample description.
                    requestId: '500123'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Login500Example:
                  summary: Default login 500 response
                  x-microcks-default: true
                  value:
                    '@type': example_value
                    statusCode: 10
                    message: example_value
                    description: A sample description.
                    requestId: '500123'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /saas/api/v2/user/logout:
    post:
      operationId: logout
      summary: Informatica Log Out and End the Rest Api Session
      description: >-
        Ends the current REST API session. You can also end all active
        sessions for the organization.
      tags:
