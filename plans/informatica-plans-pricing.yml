specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Informatica
providerId: informatica
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Data Integration
  - Data Quality
  - Data Governance
  - MDM
  - iPaaS
  - IDMC
description: Informatica's flagship Intelligent Data Management Cloud (IDMC) is sold on a consumption-based
  IPU (Informatica Processing Unit) model. Customers buy a pool of IPUs that can be spent across all
  eligible IDMC services (CDI, CAI, CDQ, MDM-domain records, B2B Gateway, API & App Integration, etc.).
  Public per-IPU dollar pricing is not published; Informatica directs prospects to a contact-sales
  estimate. Master Data Management is additionally metered on a per-domain-records basis.
notes: Per-IPU dollar amount not publicly disclosed. Pricing is volume-based and quoted by Informatica
  sales. Reconcile against an Informatica IPU quote.
sources:
  - https://www.informatica.com/products/cloud-integration/pricing.html
  - https://www.informatica.com/products.html
plans:
  - id: informatica-idmc-ipu
    name: IDMC — IPU Consumption
    type: usage-based
    description: Pooled IPU consumption model covering all eligible IDMC services (Cloud Data Integration,
      Cloud Application Integration, Cloud Data Quality, B2B Gateway, API & App Integration, Cloud Mass
      Ingestion, Data Marketplace, etc.). Customers pre-purchase IPU capacity and consume it across services.
    entries:
      - label: IPU pool
        description: Pre-purchased Informatica Processing Units consumable across IDMC services
        name: ipu_pool
        type: subscription
        metric: IPU
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://{pod}.informaticacloud.com
        unit: 1
        price: contact sales for IPU rate
        userMultiplied: false
      - label: Per-IPU consumption
        description: Each eligible service publishes a per-scaler IPU consumption rate (e.g. CDI-e per-job-minute,
          API & App Integration per-call, Mass Ingestion per-volume)
        name: ipu_consumption
        type: metered
        metric: IPU
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://{pod}.informaticacloud.com
        unit: 1
        price: see Informatica IDMC Cloud and Product Description Schedule
        userMultiplied: false
    elements:
      - name: Cloud Data Integration (CDI / CDI-e)
      - name: Cloud Application Integration (CAI)
      - name: Cloud Data Quality (CDQ)
      - name: Cloud Mass Ingestion (CMI)
      - name: API & App Integration
      - name: B2B Gateway
      - name: Data Marketplace
      - name: Consumption monitoring dashboard
      - name: Threshold alerting
  - id: informatica-mdm
    name: Master Data Management — Per-Domain Records
    type: usage-based
    description: MDM is licensed on a per-domain-records basis (Customer 360, Supplier 360, Product 360,
      etc.) layered on top of an IPU pool.
    entries:
      - label: Domain records
        description: Mastered records per domain
        name: domain_records
        type: subscription
        metric: record
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://{pod}.informaticacloud.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Customer 360 / Supplier 360 / Product 360 / Reference 360
      - name: Match and merge
      - name: Hierarchy management
      - name: Stewardship UI
  - id: informatica-enterprise
    name: Enterprise Volume Agreement
    type: enterprise
    description: Multi-year, volume-discounted IPU agreement with negotiated terms, dedicated technical
      account management, and security review.
    entries:
      - label: Enterprise IPU agreement
        description: Negotiated multi-year IPU commitment with discounting
        name: enterprise_agreement
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        domains:
          - https://{pod}.informaticacloud.com
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Volume discounts
      - name: Multi-year commitment
      - name: Technical account management
      - name: Security and compliance review
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
