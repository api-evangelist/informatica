specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Informatica
providerId: informatica
publisherName: Informatica LLC
serviceCategory: Data Integration + Management
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Data Integration
  - iPaaS
  - IDMC
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for Informatica IDMC. Billing is consumption-based via Informatica
  Processing Units (IPUs) drawn from a pre-purchased pool, with MDM additionally metered per-domain
  records. The single fungible meter (IPU) maps cleanly to FOCUS Usage charges and supports per-service
  attribution.
notes: Per-IPU dollar amount not publicly disclosed; the IPU itself is the canonical meter. Reconcile
  against the customer's Cloud and Product Description Schedule and IDMC Consumption dashboard.
sources:
  - https://www.informatica.com/products/cloud-integration/pricing.html
principles:
  - name: Visibility
    description: Use the IDMC Consumption Dashboard and the Audit Log API to see per-service IPU consumption
      and project burn-rate against the pre-purchased pool.
  - name: Allocation
    description: Tag projects, folders, and runtime environments by team / business unit so IPU consumption
      can be attributed; export consumption to FinOps tooling via the Cloud Audit Log API.
  - name: Optimization
    description: Tune CDI-e job parallelism, prefer push-down compute, retire low-value scheduled jobs,
      and right-size Secure Agents to lower IPU burn-rate per job.
  - name: Accountability
    description: Designate a data-engineering FinOps owner with monthly IPU-burn review; set IPU consumption
      thresholds and alerts in the admin UI to flag anomalies before pool exhaustion.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Informatica IDMC
  ServiceCategory: Data Integration + Management
  ProviderName: Informatica
  PublisherName: Informatica LLC
  InvoiceIssuerName: Informatica LLC
  PricingCategory: Pay-As-You-Go
  PricingUnit: IPU
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: ipu_consumption
    description: Informatica Processing Units consumed across IDMC services
    unit: IPU
    aggregation: sum
    dimensions:
      - service
      - org
      - project
      - runtime_environment
  - name: mdm_records
    description: Mastered records under management per MDM domain
    unit: record-month
    aggregation: max
    dimensions:
      - domain
      - environment
  - name: secure_agents
    description: Secure Agents in operation
    unit: agent-month
    aggregation: max
    dimensions:
      - runtime_environment
      - region
apis:
  - name: Informatica IDMC REST API
    baseURL: https://{pod}.informaticacloud.com
    serviceCategory: API
  - name: Informatica API & App Integration
    baseURL: https://{pod}.informaticacloud.com
    serviceCategory: API
  - name: Informatica Cloud Data Integration
    baseURL: https://{pod}.informaticacloud.com
    serviceCategory: API
unitEconomics:
  - name: IPU Cost per Job-Minute
    metric: billed_cost / job_minutes
    target: TBD
  - name: IPU Cost per Mastered Record
    metric: billed_cost / mdm_records
    target: TBD
