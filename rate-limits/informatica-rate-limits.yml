specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Informatica
providerId: informatica
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Data Integration
  - iPaaS
  - IDMC
  - Rate Limiting
description: Informatica IDMC governs throughput primarily via the IPU consumption ceiling and per-service
  Secure Agent / runtime concurrency limits rather than published per-second HTTP rate limits. API & App
  Integration processes have configurable concurrency on the Cloud Server runtime; mass ingestion and
  data integration jobs scale by Secure Agent capacity. Specific per-second TPS values are tenant- and
  pod-dependent.
notes: No public Informatica IDMC rate-limit table. Customers should consult their pod's Cloud Application
  Integration / Cloud Data Integration administration UI for concurrency limits.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: IDMC API throughput
    scope: org
    metric: varies
    limit: governed by Secure Agent capacity, runtime concurrency, and IPU consumption ceiling
    applies:
      - Informatica IDMC REST API
      - Informatica API & App Integration
      - Informatica Cloud Data Integration
  - name: Cloud Application Integration process concurrency
    scope: org
    metric: concurrent_processes
    limit: configurable on the Cloud Server / Secure Agent runtime
    applies:
      - Informatica API & App Integration
policies:
  - name: Backoff Strategy
    description: Clients receiving 429 or 503 should implement exponential backoff with jitter and honor
      Retry-After when present.
  - name: IPU Consumption Alerting
    description: Set IPU consumption thresholds in the IDMC admin UI to receive alerts before pool exhaustion
      throttles new job submissions.
  - name: Runtime Sizing
    description: Throughput is bounded by Secure Agent / runtime sizing; scale by adding agents or moving
      to a Cloud Server runtime.
  - name: Fair Use
    description: Informatica reserves the right to throttle traffic that materially impacts shared pod
      infrastructure.
maintainers:
